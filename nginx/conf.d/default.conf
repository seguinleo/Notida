server {
  listen 80;
  server_name localhost;
  server_tokens off;
  proxy_hide_header X-Powered-By;

  add_header X-Content-Type-Options "nosniff" always;
  add_header Access-Control-Allow-Origin "*"; # your website URL
  add_header Referrer-Policy "no-referrer" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload";
  add_header X-Frame-Options "DENY" always;
  add_header Content-Security-Policy "default-src 'none'; connect-src 'self'; font-src 'self' data:; form-action 'self'; img-src https: data:; manifest-src 'self'; media-src https:; script-src 'self'; script-src-attr 'none'; style-src 'self' 'unsafe-inline'; worker-src 'self'";
  add_header Permissions-Policy "geolocation=()" always;
  # add_header Cross-Origin-Embedder-Policy "require-corp";
  add_header Cross-Origin-Opener-Policy "cross-origin" always;
  add_header Cross-Origin-Resource-Policy "cross-origin" always;

  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
    limit_except GET POST {
      deny all;
    }
  }

  location /api/ {
    proxy_pass http://api:3000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
